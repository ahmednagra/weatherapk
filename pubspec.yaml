name: changi_agriweather
description: Premium agricultural pinpoint-weather app for Village Changi, Sialkot.
publish_to: "none"
version: 2.0.0+2

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  # Routing
  go_router: ^14.2.0
  # Networking
  dio: ^5.5.0+1
  # Value equality for immutable models/entities
  equatable: ^2.0.5
  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts, maps, fonts, notifications
  fl_chart: ^0.69.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_local_notifications: ^17.2.3
  google_fonts: ^6.2.1

  # UI: Material You dynamic color, motion, 3D weather animations
  dynamic_color: ^1.7.0
  flutter_animate: ^4.5.0
  rive: ^0.13.20

  # Farmer features: background alerts, home-screen widget, Urdu voice advisory
  workmanager: ^0.5.2
  home_widget: ^0.6.0
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/wx/
    - assets/rive/
